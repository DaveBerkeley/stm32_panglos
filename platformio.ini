
[env]
platform = ststm32
framework = cmsis

#lib_deps = cli
#	printf

build_flags = 
	-D USE_DEBUG=1
	-D STM32
	-D FREERTOS=1
	-I lib
    -Wno-missing-field-initializers
    '-Wformat=2'
    '-Werror=format'
    '-Wno-format-zero-length'
    '-Wno-format-nonliteral'
    -D CLI_MAX_ARGS=20

extra_scripts = pre:link_libs.py

;
;

[env:nucleo_f446re]
board = nucleo_f446re

board_build.mcu = stm32f446ret6

board_build.f_cpu = 180000000L

upload_protocol = stlink


